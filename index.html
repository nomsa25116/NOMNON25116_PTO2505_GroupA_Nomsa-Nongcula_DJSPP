<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Podcast Explorer - Discover Your Favorite Shows</title>

    <!-- SEO Meta Tags -->
    <meta name="description" content="Explore and discover amazing podcasts with Podcast Explorer. Browse shows by genre, listen to episodes, and manage your favorites in a sleek, responsive interface." />
    <meta name="keywords" content="podcasts, audio shows, episodes, genres, streaming, favorites, discover" />
    <meta name="author" content="Podcast Explorer Team" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Podcast Explorer - Discover Your Favorite Shows" />
    <meta property="og:description" content="Explore and discover amazing podcasts with Podcast Explorer. Browse shows by genre, listen to episodes, and manage your favorites." />
    <meta property="og:image" content="/podcast-explorer-og-image.png" />
    <meta property="og:url" content="https://podcast-explorer.com" />
    <meta property="og:site_name" content="Podcast Explorer" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Podcast Explorer - Discover Your Favorite Shows" />
    <meta name="twitter:description" content="Explore and discover amazing podcasts with Podcast Explorer. Browse shows by genre, listen to episodes, and manage your favorites." />
    <meta name="twitter:image" content="/podcast-explorer-twitter-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <script>
      // Apply saved theme before React renders to prevent flash
      const savedTheme = localStorage.getItem("theme");
      if (savedTheme === "dark") {
        document.documentElement.classList.add("dark-mode");
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
